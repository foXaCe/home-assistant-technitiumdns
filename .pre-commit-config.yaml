# Runs with prek (Rust drop-in) or pre-commit. See CONTRIBUTING.md.
# mypy is intentionally NOT a blocking hook here (config lives in pyproject.toml);
# run `scripts/lint` for full type checking.

# pre-commit.ci configuration.
# autofix_prs is OFF because this repository enforces DCO sign-off and
# pre-commit.ci's auto-fix commits cannot be signed off. The formatting hooks
# are skipped on pre-commit.ci until the legacy code is reformatted (tracked for
# a dedicated ha-integration-overhaul pass); they still run locally via prek.
ci:
  autofix_prs: false
  autoupdate_schedule: monthly
  skip:
    - ruff
    - ruff-format
    - end-of-file-fixer
    - trailing-whitespace
    - mixed-line-ending

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]
