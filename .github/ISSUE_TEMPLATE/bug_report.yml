name: Bug report
description: Report something that is broken or incorrect
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please search existing issues first.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: e.g. v1.2.0 or main @ abc1234
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime versions, relevant configuration.
      placeholder: e.g. Ubuntu 24.04, Python 3.12, Docker 27
