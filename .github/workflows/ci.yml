name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate HACS manifest
        run: |
          test -f hacs.json
          python3 -c "import json; json.load(open('hacs.json'))"
          test -f custom_components/technitiumdns/manifest.json
          python3 -c "import json; json.load(open('custom_components/technitiumdns/manifest.json'))"

  hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hassfest
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-venv
          python3 -m venv .venv
          .venv/bin/pip install --quiet homeassistant
          .venv/bin/python -m script.hassfest

  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: bash .github/scripts/verify-dco.sh

  required:
    name: Required checks
    runs-on: ubuntu-latest
    needs: [validate-hacs, hassfest, dco]
    if: always()
    steps:
      - run: |
          if [[ "${{ needs.validate-hacs.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.hassfest.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ needs.dco.result }}" != "success" ]]; then exit 1; fi
          echo "All required CI checks passed."
