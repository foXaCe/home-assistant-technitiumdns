name: CI (GitHub)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-github-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-hacs:
    name: HACS validation
    if: contains(github.server_url, 'github.com')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # main
        with:
          category: integration

  hassfest:
    name: Hassfest validation
    if: contains(github.server_url, 'github.com')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c # master

  dco:
    name: DCO sign-off
    if: contains(github.server_url, 'github.com') && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - run: bash .github/scripts/verify-dco.sh

  required:
    name: Required checks
    if: always() && contains(github.server_url, 'github.com')
    runs-on: ubuntu-latest
    needs: [validate-hacs, hassfest, dco]
    steps:
      - run: |
          if [[ "${{ needs.validate-hacs.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.hassfest.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ needs.dco.result }}" != "success" ]]; then exit 1; fi
          echo "All required CI checks passed."
