name: Security audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit (PyPI requirements)
    if: contains(github.server_url, 'github.com')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14.6"
      - name: Install pip-audit
        run: pipx install pip-audit
      - name: Audit manifest.json requirements
        run: |
          set -euo pipefail
          for m in $(find custom_components -name manifest.json); do
            python3 -c "import json,sys; print('\n'.join(json.load(open('$m')).get('requirements', [])))" > /tmp/reqs.txt
            if [ -s /tmp/reqs.txt ]; then
              echo "Auditing requirements from $m:"
              cat /tmp/reqs.txt
              pip-audit --requirement /tmp/reqs.txt --strict
            fi
          done

  gitleaks:
    name: Secret scan (gitleaks)
    if: contains(github.server_url, 'github.com')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
